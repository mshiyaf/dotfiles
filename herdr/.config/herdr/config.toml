# Herdr configuration.
# Only overrides live here; see `herdr --default-config` for everything else.
# Reload with: herdr server reload-config

onboarding = false

# Sessionizer: fuzzy-pick a project (local or GitHub) and open/focus it
# as a herdr workspace. Same muscle memory as tmux prefix+f.
[[keys.command]]
key = "prefix+f"
type = "popup"
command = "~/.config/zsh/herdr-sessionizer.sh"
description = "fuzzy open project workspace"
width = "85%"
height = "75%"
