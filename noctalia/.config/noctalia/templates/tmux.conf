# tmux color scheme generated by noctalia

thm_base="{{colors.surface.default.hex}}"
thm_surface="{{colors.surface_container.default.hex}}"
thm_overlay="{{colors.surface_container_high.default.hex}}"
thm_muted="{{colors.on_surface_variant.default.hex}}"
thm_subtle="{{colors.outline.default.hex}}"
thm_text="{{colors.on_surface.default.hex}}"
thm_love="{{colors.error.default.hex}}"
thm_gold="{{colors.tertiary.default.hex}}"
thm_rose="{{colors.secondary.default.hex}}"
thm_pine="{{colors.primary.default.hex}}"
thm_foam="{{colors.tertiary_container.default.hex}}"
thm_iris="{{colors.primary_container.default.hex}}"
thm_hl_low="{{colors.surface_container_low.default.hex}}"
thm_hl_med="{{colors.surface_container_high.default.hex}}"
thm_hl_high="{{colors.outline_variant.default.hex}}"

thm_on_pine="{{colors.on_primary.default.hex}}"
thm_on_rose="{{colors.on_secondary.default.hex}}"
thm_on_love="{{colors.on_error.default.hex}}"
thm_on_gold="{{colors.on_tertiary.default.hex}}"
thm_on_iris="{{colors.on_primary_container.default.hex}}"

# Border Style
set -g pane-active-border-style "fg=$thm_gold"
set -g pane-border-style "fg=$thm_hl_high"

# Message Style
set -g message-style "fg=$thm_muted,bg=default"

# Status line Style
set -g status-style "fg=$thm_pine,bg=default"

## Left Section
### change color and icon according to the current mode
set -g status-left "#[fg=${thm_on_rose},bg=${thm_rose}]"
set -ga status-left "\
#{?client_prefix,#[fg=${thm_on_iris} bg=${thm_iris}] \ue7a2,\
#{?window_zoomed_flag,#[fg=${thm_on_gold} bg=${thm_gold}] \uf002,\
#{?pane_synchronized,#[fg=${thm_on_love} bg=${thm_love}]  \uf46a, \uf0c9}}}  "

## Window Section
setw -g window-status-separator ''
setw -g window-status-format "   "
setw -ga window-status-format "#[fg=${thm_muted},bg=default] #I #W "
setw -ga window-status-format "   "

### current selected window
setw -g window-status-current-format "#[fg=${thm_on_pine},bg=${thm_pine}] "
setw -ga window-status-current-format "#[fg=${thm_on_pine},bg=${thm_pine}] \uf102 #W "
setw -ga window-status-current-format "#[bg=default] #[bg=default] "

## Right Section
set -g status-right-length 150
setw -g status-right "\
#[bg=${thm_hl_low}] \
#[bg=${thm_hl_med}] \
#[bg=${thm_overlay}] \
#[fg=${thm_on_pine},bg=${thm_pine}]"
### base name of current directory
setw -ga status-right " #{?#{==:#{pane_current_path},#{HOME}},\uf015 ~,\
\uf07b #{b:pane_current_path}} "
setw -ga status-right " #[fg=${thm_text},bg=${thm_overlay}] #S "
### hostname
set -ga status-right "\
#{?client_prefix,#[fg=${thm_on_iris} bg=${thm_iris}],\
#{?window_zoomed_flag,#[fg=${thm_on_gold} bg=${thm_gold}],\
#{?pane_synchronized,#[fg=${thm_on_love} bg=${thm_love}]}}} \uf121  #[bold]#h   "

# vim: ft=tmux
