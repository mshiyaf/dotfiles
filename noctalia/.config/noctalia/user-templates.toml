[config]

[templates]

# User-defined templates
# Add your custom templates below
# Example:
# [templates.myapp]
# input_path = "~/.config/noctalia/templates/myapp.css"
# output_path = "~/.config/myapp/theme.css"
# post_hook = "myapp --reload-theme"

[templates.tmux]
input_path = "~/.config/noctalia/templates/tmux.conf"
output_path = "~/.tmux.colors-powerline.conf"
post_hook = "tmux source-file ~/.tmux.conf 2>/dev/null || true"

[templates.opencode]
input_path = "~/.config/noctalia/templates/opencode.json"
output_path = "~/.config/opencode/themes/noctalia.json"

