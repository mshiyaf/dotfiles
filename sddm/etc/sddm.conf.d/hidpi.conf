# HiDPI scaling for the SDDM greeter on this laptop's 2560x1600 panel.
# Without this the astronaut login/lock screen renders at native resolution and
# everything looks tiny. 1.5 matches niri's in-session scale (Scale: 1.5 on eDP-2).
#
# Managed in dotfiles, symlinked to /etc/sddm.conf.d/hidpi.conf so it survives
# sddm-astronaut-theme package updates (which only overwrite /usr/share/sddm/...).
# Nudge the factor to 1.25 / 1.75 here if 1.5 feels off, then restart sddm.
[General]
GreeterEnvironment=QT_SCREEN_SCALE_FACTORS=1.5
